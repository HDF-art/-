# 邮件配置说明
# 请配置以下内容以启用邮件发送功能

# SMTP服务器地址
mail.smtp.host=smtp.qq.com

# SMTP端口 (587 for TLS, 465 for SSL)
mail.smtp.port=587

# 邮箱账号
mail.smtp.username=your_email@qq.com

# 邮箱授权码 (不是密码)
mail.smtp.password=your_auth_code

# 是否启用TLS
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.smtp.starttls.required=true

# 发件人邮箱
mail.from=noreply@admp.online
