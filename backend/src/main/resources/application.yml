server:
  port: 8100
  servlet:
    context-path: /api

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: agri-platform
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/agri_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  
  mail:
    host: smtp.yeah.net
    port: 465
    username: ${MAIL_USERNAME:placeholder@yeah.net}
    password: ${MAIL_PASSWORD:placeholder}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
  
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB

jwt:
  secret: ${JWT_SECRET:agri-platform-jwt-secret-key-2024}
  expiration: ${JWT_EXPIRATION:86400000}

model:
  service:
    url: ${MODEL_SERVICE_URL:http://localhost:5000/predict}
    base-url: ${MODEL_SERVICE_BASE_URL:http://localhost:5000}
  save-path: ${MODEL_SAVE_PATH:./models}

upload:
  image-path: ${UPLOAD_IMAGE_PATH:./upload/images}
  model-path: ${UPLOAD_MODEL_PATH:./upload/models}
  dataset-path: ${UPLOAD_DATASET_PATH:./upload/datasets}
  max-size: 1073741824

file:
  upload-dir: ${UPLOAD_DATASET_PATH:./upload/datasets}

logging:
  level:
    com.agri: info

fedlab:
  script:
    path: ${FEDLAB_SCRIPT_PATH:/home/ubuntu/农业大数据联合建模平台/models/fedlab_server_runner.py}

z-ai:
  api-key: ${ZAI_API_KEY:}
  model: ${ZAI_MODEL:glm-5.1}
  url: ${ZAI_URL:https://open.bigmodel.cn/api/paas/v4/chat/completions}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
