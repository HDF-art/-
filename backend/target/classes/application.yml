server:
  port: 8100
  servlet:
    context-path: /api

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: agri-platform
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/agri_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  mail:
    host: smtp.yeah.net
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}
    database: 0
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

model:
  service:
    url: ${MODEL_SERVICE_URL:http://localhost:5000/api/crop-disease}
  save-path: ${MODEL_SAVE_PATH:./models}

upload:
  image-path: ${UPLOAD_IMAGE_PATH:./upload/images}
  model-path: ${UPLOAD_MODEL_PATH:./upload/models}
  max-size: 10485760

logging:
  level:
    com.agri: info

z-ai:
  api-key: ${ZAI_API_KEY}
  model: ${ZAI_MODEL:glm-5.1}
  url: ${ZAI_URL:https://open.bigmodel.cn/api/paas/v4/chat/completions}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
